<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Agent</title>
    <!-- Подключаем Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h1 class="text-center">Add a New Agent</h1>

        {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
        {% endif %}

        <div class="card shadow p-4">
            <form method="POST">
                <div class="mb-3">
                    <label for="codename" class="form-label">Agent Codename:</label>
                    <input type="text" id="codename" name="codename" class="form-control" required>

                    <label for="phone" class="form-label">Agent Phone:</label>
                    <input type="tel" id="phone" name="phone" class="form-control" required>

                    <label for="email" class="form-label">Agent Email:</label>
                    <input type="email" id="email" name="email" class="form-control" required>


                    <br><label class="form-label">Agent Access Level:</label><br>
                    <input type="radio" id="secret" name="access_level" value="Секретно" required> <label for="secret">Секретно</label><br>
                    <input type="radio" id="top_secret" name="access_level" value="Совершенно секретно"> <label for="top_secret">Совершенно секретно</label><br>

                </div>
                <button type="submit" class="btn btn-primary w-100">Add Agent</button>
            </form>
        </div>

        <div class="text-center mt-4">
            <a href="{{ url_for('get_agents') }}" class="btn btn-secondary">Back to Agent List</a>
        </div>
    </div>

</body>
</html>
