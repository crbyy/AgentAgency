<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent List</title>
    <!-- Подключаем Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h1 class="text-center">Agent List</h1>
        <a href="{{ url_for('search_agent') }}" class="btn btn-outline-primary">Search</a>

        <br><br>
        <div class="mb-4">
            <a href="{{ url_for('get_agents', level='all') }}" class="btn btn-sm {% if current_level == 'all' %}btn-primary{% else %}btn-outline-secondary{% endif %}">All</a>
            <a href="{{ url_for('get_agents', level='Секретно') }}" class="btn btn-sm {% if current_level == 'Секретно' %}btn-primary{% else %}btn-outline-secondary{% endif %}">Секретно</a>
            <a href="{{ url_for('get_agents', level='Совершенно секретно') }}" class="btn btn-sm {% if current_level == 'Совершенно секретно' %}btn-primary{% else %}btn-outline-secondary{% endif %}">Совершенно секретно</a>
        </div>


        <div class="card shadow p-3">
            <ul class="list-group">
                {% for agent in agents %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    {{ agent.codename }}
                    <div>
                        <a href="{{ url_for('get_agent', id=agent.id) }}" class="btn btn-info btn-sm">Data</a>
                        <a href="{{ url_for('edit_agent', id=agent.id) }}" class="btn btn-sm btn-warning">Edit</a>
                        <a href="{{ url_for('delete_agent', id=agent.id) }}" class="btn btn-sm btn-danger"
                           onclick="return confirm('Are you sure?')">Delete</a>
                    </div>
                </li>
                {% endfor %}
            </ul>
        </div>

        <div class="text-center mt-4">
            <a href="{{ url_for('add_agent') }}" class="btn btn-success">Add New Agent</a>
        </div>
    </div>
    <footer class="text-center mt-4">
        <a href="{{ url_for('delete_all') }}" class="btn btn-danger"
            onclick="return confirm('Точно удалить всех агентов?')">💀 Удалить всех</a>
    </footer>
</body>
</html>
