<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent List</title>
    <!-- Подключаем Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h1 class="text-center">Список Агентов</h1>
        <a href="{{ url_for('search_agent') }}" class="btn btn-outline-primary">Поиск</a>

        <br><br>
        <div class="mb-4">
            <a href="{{ url_for('get_agents', level='all') }}"
               class="btn btn-sm {% if current_level == 'all' %}btn-primary{% else %}btn-outline-secondary{% endif %}">Все</a>
            <a href="{{ url_for('get_agents', level='Секретно') }}" class="btn btn-sm {% if current_level == 'Секретно' %}btn-primary{% else %}btn-outline-secondary{% endif %}">Секретно</a>
            <a href="{{ url_for('get_agents', level='Совершенно секретно') }}" class="btn btn-sm {% if current_level == 'Совершенно секретно' %}btn-primary{% else %}btn-outline-secondary{% endif %}">Совершенно секретно</a>
        </div>


        <div class="card shadow p-3">
            <ul class="list-group">
                {% for agent in agents %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    {{ agent.codename }}
                    <div>
                        <a href="{{ url_for('get_agent', id=agent.id) }}" class="btn btn-info btn-sm">Данные</a>
                        <a href="{{ url_for('edit_agent', id=agent.id) }}" class="btn btn-sm btn-warning">Ред.</a>
                        <form method="POST" action="{{ url_for('delete_agent', id=agent.id) }}" style="display: inline;">
                            <button type="submit" class="btn btn-sm btn-danger"
                                    onclick="return confirm('Вы уверены?')">Удалить</button>
                        </form>
                    </div>
                </li>
                {% endfor %}
            </ul>
        </div>

        <div class="text-center mt-4">
            <a href="{{ url_for('add_agent') }}" class="btn btn-success">Добавить Агента</a>
        </div>
    </div>

    <footer class="text-center mt-4">
        <form method="POST" action="{{ url_for('delete_all') }}" style="display: inline;">
            <button type="submit" class="btn btn-danger"
                    onclick="return confirm('Точно удалить всех агентов?')">💀 Удалить всех</button>
        </form>
    </footer>
</body>
</html>
