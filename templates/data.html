<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agent Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="text-center">Agent Data</h1>

    <div class="card shadow p-4">

        <p><strong>Codename:</strong> {{ agent.codename }}</p>
        <p><strong>Phone:</strong> {{ agent.phone }}</p>
        <p><strong>Email:</strong> {{ agent.email }}</p>
        <p><strong>Access Level:</strong> {{ agent.access_level }}</p>

        <div class="mt-3">
            <a href="{{ url_for('edit_agent', id=agent.id) }}" class="btn btn-warning">Edit</a>
            <a href="{{ url_for('delete_agent', id=agent.id) }}" class="btn btn-danger" onclick="return confirm('Delete agent?')">Delete</a>
            <a href="{{ url_for('get_agents') }}" class="btn btn-secondary">Back to list</a>
        </div>
    </div>
</div>

</body>
</html>
