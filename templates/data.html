<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Agent Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="text-center">Данные Агента</h1>

    <div class="card shadow p-4">

        <p><strong>Кодовое имя:</strong> {{ agent.codename }}</p>
        <p><strong>Телефон:</strong> {{ agent.phone }}</p>
        <p><strong>Email:</strong> {{ agent.email }}</p>
        <p><strong>Уровень доступа:</strong> {{ agent.access_level }}</p>

        <div class="mt-3">
            <a href="{{ url_for('edit_agent', id=agent.id) }}" class="btn btn-warning">Ред.</a>
            <a href="{{ url_for('delete_agent', id=agent.id) }}" class="btn btn-danger"
               onclick="return confirm('Удалить Агента?')">Удалить</a>
            <a href="{{ url_for('get_agents') }}" class="btn btn-secondary">К списку Агентов</a>
        </div>
    </div>
</div>

</body>
</html>
