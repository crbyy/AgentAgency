<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Agent</title>
    <!-- Подключаем Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h1 class="text-center">Редактирование данных Агента</h1>

        <div class="card shadow p-4">
            <form method="POST">
                <div class="mb-3">
                    <label for="codename" class="form-label"> Изменить Кодовое имя:</label>
                    <input type="text" id="codename" name="codename" class="form-control" value="{{ agent.codename }}"
                           required>
                    <br>

                    <label for="phone" class="form-label"> Изменить номер телефона:</label>
                    <input type="tel" id="phone" name="phone" class="form-control" value="{{ agent.phone }}"
                           required>
                    <br>

                    <label for="email" class="form-label"> Изменить адрес электронной почты:</label>
                    <input type="email" id="email" name="email" class="form-control" value="{{ agent.email }}"
                           required>
                    <br>

                    <label class="form-label"> Изменить уровень доступа:</label><br>
                    <input type="radio" id="secret" name="access_level" value="Секретно" required> <label for="secret">Секретно</label><br>
                    <input type="radio" id="top_secret" name="access_level" value="Совершенно секретно"> <label for="top_secret">Совершенно секретно</label><br>

                </div>
                <button type="submit" class="btn btn-primary w-100">Обновить данные</button>
            </form>
        </div>

        <div class="text-center mt-4">
            <a href="{{ url_for('get_agents') }}" class="btn btn-secondary">К списку агентов</a>
        </div>
    </div>

</body>
</html>
